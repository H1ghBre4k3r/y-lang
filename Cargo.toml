[package]
name = "y-lang"
version = "0.1.2"
edition = "2021"
authors = ["Louis Meyer (H1ghBre4k3r) <h1ghbe4k3r@dev.bre4k3r.de>"]
description = "Compiler & Interpreter for the (rather new and very experimental) Y programming language."
license = "GPL-3.0"
readme = "README.md"
repository = "https://github.com/H1ghBre4k3r/y-lang"

[dependencies]
clap = { version = "4.2.3", features = ["derive"]}
log = "0.4.17"
pest = "2.5"
pest_derive = "2.5"
simple_logger = { version = "4.1.0", default-features = false, features = ["colored", "colors"]}
unescape = "0.1.0"
once_cell = "1.17"

[dev-dependencies]
test-utils = { path = "test-utils" }
