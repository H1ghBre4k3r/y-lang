[package]
name = "y-lang"
version = "0.1.3"
edition = "2021"
authors = ["Louis Meyer (H1ghBre4k3r) <h1ghbe4k3r@dev.bre4k3r.de>"]
description = "Compiler & Interpreter for the (rather new and very experimental) Y programming language."
license = "GPL-3.0"
readme = "README.md"
repository = "https://github.com/H1ghBre4k3r/y-lang"

[dependencies]
clap = { version = "4.5.35", features = ["derive"]}
log = "0.4.26"
pest = "2.8"
pest_derive = "2.8"
simple_logger = { version = "5.0.0", default-features = false, features = ["colored", "colors"]}
unescape = "0.1.0"
once_cell = "1.21"
home = "0.5.11"
include_dir = "0.7.4"

[dev-dependencies]
test-utils = { path = "test-utils" }
