[package]
name = "y-lang"
version = "0.1.3"
edition = "2021"
authors = ["Louis Meyer (H1ghBre4k3r) <h1ghbe4k3r@dev.bre4k3r.de>"]
description = "Compiler & Interpreter for the (rather new and very experimental) Y programming language."
license = "GPL-3.0"
readme = "README.md"
repository = "https://github.com/H1ghBre4k3r/y-lang"

[dependencies]
clap = { version = "4.3.4", features = ["derive"]}
pest = "2.6"
pest_derive = "2.6"
unescape = "0.1.0"
once_cell = "1.18"
home = "0.5.5"
include_dir = "0.7.3"
tracing = "0.1.37"
tracing-subscriber = "0.3.17"

[dev-dependencies]
test-utils = { path = "test-utils" }
